<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | NASAM</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/checkout.css">
</head>
<body>
  <div id="cursor"></div>

  <!-- Navbar -->
  <nav class="navbar scrolled">
    <div class="nav-brand"><a href="../index.html">NASAM</a></div>
    <div class="nav-links">
      <a href="../index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
    <div class="nav-right">
      <div class="cart-icon">
        🛒
        <span class="cart-badge">0</span>
      </div>
    </div>
  </nav>

  <!-- Checkout Container -->
  <section class="checkout-container reveal">
    
    <!-- Checkout Form -->
    <div class="checkout-form">
      <h2 class="brand-font">Checkout</h2>
      
      <form id="checkout-form">
        <!-- Contact Info -->
        <div class="form-section">
          <h3>Contact Information</h3>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="Email" required>
          </div>
        </div>

        <!-- Shipping Address -->
        <div class="form-section">
          <h3>Shipping Address</h3>
          <div class="form-row">
            <div class="form-group">
              <label>First Name</label>
              <input type="text" placeholder="First Name" required>
            </div>
            <div class="form-group">
              <label>Last Name</label>
              <input type="text" placeholder="Last Name" required>
            </div>
          </div>
          <div class="form-group" style="margin-bottom: 20px;">
            <label>Address</label>
            <input type="text" placeholder="Street Address, Apartment, etc." required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>City</label>
              <input type="text" placeholder="City" required>
            </div>
            <div class="form-group">
              <label>Phone Number</label>
              <input type="tel" placeholder="Phone" required>
            </div>
          </div>
        </div>

        <!-- Payment Method -->
        <div class="form-section">
          <h3>Payment Method</h3>
          <div class="payment-methods">
            <label class="payment-method active">
              <input type="radio" name="payment" value="card" checked>
              <span>Credit / Debit Card</span>
            </label>
            <label class="payment-method">
              <input type="radio" name="payment" value="cod">
              <span>Cash on Delivery</span>
            </label>
            <label class="payment-method">
              <input type="radio" name="payment" value="wallet">
              <span>Mobile Wallet (InstaPay/Vodafone Cash)</span>
            </label>
          </div>
        </div>

        <button type="submit" class="btn" style="width: 100%; font-size: 1.2rem; padding: 15px;">Place Order</button>
      </form>
    </div>

    <!-- Order Summary -->
    <div class="order-summary">
      <h2 class="brand-font">Order Summary</h2>
      <div class="summary-items">
        <!-- Items injected via JS -->
      </div>
      <div class="summary-total">
        <span>Total</span>
        <span class="summary-total-amount">0 EGP</span>
      </div>
    </div>

  </section>

  <!-- Footer -->
  <footer class="footer">
    <h2 class="footer-brand brand-font">NASAM</h2>
    <div class="footer-socials">
      <a href="#">IG</a>
      <a href="#">TK</a>
      <a href="#">WA</a>
    </div>
    <div class="footer-bottom">
      All Rights Reserved &copy; NASAM 2025
    </div>
  </footer>

  <!-- Cart Drawer -->
  <div class="cart-overlay"></div>
  <div class="cart-drawer">
    <div class="cart-header">
      <h2 class="brand-font">Your Cart</h2>
      <button class="close-cart">&times;</button>
    </div>
    <div class="cart-items"></div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>Total</span>
        <span class="total-amount">0 EGP</span>
      </div>
      <button class="btn checkout-btn">Checkout</button>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script src="../js/animations.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/checkout.js"></script>
</body>
</html>
